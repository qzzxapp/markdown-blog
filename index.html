<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — 一个安静的角落</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <nav class="nav">
                <a href="index.html" class="logo">Blog</a>
                <div class="nav-links">
                    <a href="index.html" class="active">文章</a>
                    <a href="#" id="about-link">关于</a>
                    <button class="theme-toggle" id="theme-toggle" aria-label="切换主题">
                        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                </div>
            </nav>
        </div>
    </header>

    <main class="container main-content">
        <section class="hero">
            <h1>一个安静的角落</h1>
            <p class="hero-subtitle">记录技术、思考与生活</p>
        </section>

        <section class="posts" id="posts-container">
            <!-- JS 动态渲染 -->
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Blog · 用文字丈量世界</p>
        </div>
    </footer>

    <!-- 关于弹窗 -->
    <div class="modal-overlay" id="about-modal">
        <div class="modal">
            <button class="modal-close" id="modal-close">&times;</button>
            <h2>关于这个博客</h2>
            <p>这是一个基于 Markdown 的极简静态博客。</p>
            <ul>
                <li>📝 文章以 Markdown 文件存储在 <code>posts/</code> 目录</li>
                <li>🎨 客户端渲染，无需后端服务</li>
                <li>🌙 支持暗色模式</li>
                <li>⚡ 零依赖后端，毫秒级响应</li>
                <li>🤖 由 <strong>Hermes Agent</strong> 在 Mac mini M2 上构建</li>
            </ul>
            <p class="modal-footer">写文章？只需在 <code>posts/</code> 目录新增一个 <code>.md</code> 文件。</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/blog.js"></script>
</body>
</html>
